<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Наш смак — Створи свій бокс</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="box-builder.css">
</head>
<body>

  <!-- Overlay -->
  <div class="overlay">
    <span>Безкоштовна доставка від 1000 грн 🍩🍪</span>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header__logo">
      <a href="index.html"><img src="images/logo.svg" alt="Наш смак"></a>
    </div>
    <nav class="header__categories">
      <a href="pechuvo.html" class="header__cat-tab">Печиво</a>
      <a href="muffins-donuts.html" class="header__cat-tab">Мафіни & Донати</a>
      <button class="header__cat-tab">Набори</button>
      <button class="header__cat-tab header__cat-tab--active header__cat-tab--box">Зібрати бокс</button>
    </nav>
    <div class="header__right">
      <div class="header__nav">
        <a href="#" class="header__nav-link">Про нас
          <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1L5 5L9 1" stroke="#3A332C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
        <a href="#" class="header__nav-link">B2B</a>
      </div>
      <div class="header__icons">
        <button class="header__icon-btn header__search-btn" aria-label="Пошук">
          <img src="icons/search.svg" width="24" height="24" alt="">
        </button>
        <button class="header__icon-btn header__account-btn" aria-label="Акаунт">
          <img src="icons/account.svg" width="24" height="24" alt="">
        </button>
        <button class="header__icon-btn header__cart-btn" aria-label="Кошик">
          <img src="icons/cart.svg" width="24" height="24" alt="">
          <span class="header__cart-badge">0</span>
        </button>
        <button class="header__icon-btn header__burger-btn" aria-label="Меню">
          <img src="icons/menu.svg" width="24" height="24" alt="">
        </button>
      </div>
    </div>
  </header>

  <!-- Mobile menu -->
  <div class="mobile-menu-overlay" id="mobileMenuOverlay">
    <div class="mobile-menu">
      <div class="mobile-menu__header">
        <span class="mobile-menu__title">Меню</span>
        <button class="mobile-menu__close" id="mobileMenuClose" aria-label="Закрити">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <line x1="6" y1="6" x2="18" y2="18" stroke="#3A332C" stroke-width="2" stroke-linecap="round"/>
            <line x1="18" y1="6" x2="6" y2="18" stroke="#3A332C" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <nav class="mobile-menu__nav">
        <a href="#" class="mobile-menu__link">
          <img src="icons/search.svg" width="20" height="20" alt=""> Пошук
        </a>
        <a href="#" class="mobile-menu__link">
          <img src="icons/account.svg" width="20" height="20" alt=""> Акаунт
        </a>
        <a href="pechuvo.html" class="mobile-menu__link">Печиво</a>
        <a href="muffins-donuts.html" class="mobile-menu__link">Мафіни & Донати</a>
        <a href="box-builder.html" class="mobile-menu__link mobile-menu__link--highlight" aria-current="page">Зібрати бокс</a>
        <a href="#" class="mobile-menu__link">Про нас</a>
        <a href="#" class="mobile-menu__link">B2B</a>
      </nav>
    </div>
  </div>

  <main class="main">
    <!-- Subcategory pills -->
    <div class="subcategories">
      <button class="pill pill--active" data-filter="sandwich">сендвіч</button>
      <button class="pill" data-filter="classic">класичне</button>
      <button class="pill" data-filter="donuts">донати</button>
      <button class="pill" data-filter="muffins">мафіни</button>
    </div>

    <!-- Content: grid + sidebar -->
    <div class="box-layout">
      <div class="product-grid product-grid--3col" id="productGrid"></div>
      <aside class="box-sidebar" id="boxSidebar">
        <!-- Rendered dynamically by JS -->
      </aside>
    </div>
  </main>

  <!-- Mobile bottom bar -->
  <div class="box-bottom-bar" id="boxBottomBar">
    <div class="box-bottom-bar__info">
      <span class="box-bottom-bar__label">Ваш бокс</span>
      <span class="box-bottom-bar__summary" id="bottomBarSummary">0 шт · 0 грн</span>
    </div>
    <div class="box-mini-map" id="boxMiniMap">
      <div class="box-mini-map__seg"></div>
      <div class="box-mini-map__seg"></div>
      <div class="box-mini-map__seg"></div>
      <div class="box-mini-map__seg"></div>
      <div class="box-mini-map__seg"></div>
      <div class="box-mini-map__seg"></div>
      <div class="box-mini-map__seg"></div>
      <div class="box-mini-map__seg"></div>
      <div class="box-mini-map__seg"></div>
    </div>
    <button class="box-bottom-bar__btn" id="bottomBarToggle">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M5 12.5L10 7.5L15 12.5" stroke="#FEFAEF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <!-- Mobile drawer -->
  <div class="box-drawer-overlay" id="boxDrawerOverlay">
    <div class="box-drawer" id="boxDrawer">
      <div class="box-drawer__header">
        <span class="box-drawer__title">Ваш бокс</span>
        <button class="box-drawer__close" id="boxDrawerClose" aria-label="Закрити">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <line x1="6" y1="6" x2="18" y2="18" stroke="#3A332C" stroke-width="2" stroke-linecap="round"/>
            <line x1="18" y1="6" x2="6" y2="18" stroke="#3A332C" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="box-drawer__content" id="boxDrawerContent">
        <!-- Populated dynamically by JS -->
      </div>
    </div>
  </div>

  <script src="products-data.js"></script>
  <script src="box-builder.js"></script>
  <script src="responsive.js"></script>
</body>
</html>
