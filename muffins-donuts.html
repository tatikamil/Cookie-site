<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Наш смак — Мафіни & Донати</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-catalog-scope="muffins,donuts" data-promos="false" data-initial-filter="all">

  <div class="overlay">
    <span>Безкоштовна доставка від 1000 грн 🍩🍪</span>
  </div>

  <header class="header">
    <div class="header__logo">
      <a href="index.html"><img src="images/logo.svg" alt="Наш смак"></a>
    </div>
    <nav class="header__categories">
      <a href="index.html" class="header__cat-tab">Печиво</a>
      <a href="muffins-donuts.html" class="header__cat-tab header__cat-tab--active">Мафіни & Донати</a>
      <button class="header__cat-tab">Набори</button>
      <a href="box-builder.html" class="header__cat-tab header__cat-tab--box">Зібрати бокс</a>
    </nav>

    <div class="header__right">
      <div class="header__nav">
        <a href="#" class="header__nav-link">Про нас
          <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1L5 5L9 1" stroke="#3A332C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
        <a href="#" class="header__nav-link">B2B</a>
      </div>
      <div class="header__icons">
        <button class="header__icon-btn header__search-btn" aria-label="Пошук">
          <img src="icons/search.svg" width="24" height="24" alt="">
        </button>
        <button class="header__icon-btn header__account-btn" aria-label="Акаунт">
          <img src="icons/account.svg" width="24" height="24" alt="">
        </button>
        <button class="header__icon-btn header__cart-btn" aria-label="Кошик">
          <img src="icons/cart.svg" width="24" height="24" alt="">
          <span class="header__cart-badge">0</span>
        </button>
        <button class="header__icon-btn header__burger-btn" aria-label="Меню">
          <img src="icons/menu.svg" width="24" height="24" alt="">
        </button>
      </div>
    </div>
  </header>

  <div class="mobile-menu-overlay" id="mobileMenuOverlay">
    <div class="mobile-menu">
      <div class="mobile-menu__header">
        <span class="mobile-menu__title">Меню</span>
        <button class="mobile-menu__close" id="mobileMenuClose" aria-label="Закрити">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <line x1="6" y1="6" x2="18" y2="18" stroke="#3A332C" stroke-width="2" stroke-linecap="round"/>
            <line x1="18" y1="6" x2="6" y2="18" stroke="#3A332C" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <nav class="mobile-menu__nav">
        <a href="#" class="mobile-menu__link">
          <img src="icons/search.svg" width="20" height="20" alt=""> Пошук
        </a>
        <a href="#" class="mobile-menu__link">
          <img src="icons/account.svg" width="20" height="20" alt=""> Акаунт
        </a>
        <a href="index.html" class="mobile-menu__link">Печиво</a>
        <a href="muffins-donuts.html" class="mobile-menu__link mobile-menu__link--highlight" aria-current="page">Мафіни & Донати</a>
        <a href="box-builder.html" class="mobile-menu__link">Зібрати бокс</a>
        <a href="#" class="mobile-menu__link">Про нас</a>
        <a href="#" class="mobile-menu__link">B2B</a>
      </nav>
    </div>
  </div>

  <main class="main">
    <div class="subcategories">
      <button class="pill pill--active" data-filter="all">Всі бісквіти</button>
      <button class="pill" data-filter="muffins">мафіни</button>
      <button class="pill" data-filter="donuts">донати</button>
    </div>

    <div class="product-grid" id="productGrid"></div>
  </main>

  <script src="products-data.js"></script>
  <script src="app.js"></script>
  <script src="responsive.js"></script>
</body>
</html>
